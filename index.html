<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Upload Files PCB</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    const NGROK_URL = "https://modish-jay-unviolently.ngrok-free.dev";
    <div class="container">
        <h1>NHẬP FILE</h1>
        <form action="${NGROK_URL}/upload" method="post" enctype="multipart/form-data">

                <label>File Trace</label>
                <input type="file" name="trace" required accept=".pdf">

</body>
